################
### MONITORS ###
################

monitor=,preferred,auto,1
ecosystem:no_update_news = true

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$vol = pamixer --get-volume


#################
### AUTOSTART ###
#################

# Barra y Widgets (Ruta corregida para el usuario Virus)
exec-once = bash -c 'eww open bar_widget && eww update get_vol="$(pamixer --get-volume)" && ~/.config/eww/scripts/getvol.sh'
exec-once = bash -c '~/.config/eww/scripts/workspace.sh'
exec-once = hyprpaper &
#exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Fondo de Pantalla (Swww)
exec-once = swww-daemon & 
exec-once = swww img ~/monasm-dots/wallpaper.jpg &

# Servicios del sistema
# Se comenta hypridle para evitar que la pantalla se apague o bloquee sola
# exec-once = hypridle 
exec-once = sh ~/.config/hypr/scripts/text_animation/anitext.sh
exec-once = sh ~/.config/hypr/scripts/weather/weather.sh


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,miku-cursor
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32
env = XCURSOR_PATH, /usr/share/icons:/home/$USER/.icons:/home/$USER/.local/share/icons
env = HYPRCURSOR_MOVE, fleur

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 3

    col.active_border = rgba(23,147,209,0.5)
    col.inactive_border = rgba(0,0,0,0)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    # Transparencia ajustada para mejor legibilidad
    active_opacity = 0.85
    inactive_opacity = 0.75

    shadow {
        enabled = true
        range = 40
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 5          # Reducido para que no sea tan fuerte
        passes = 2        # Solo una pasada para mayor nitidez
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 3, easeOutQuint, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

#############
### INPUT ###
#############

input {
    # TECLADOS: us por defecto, latam secundario
    kb_layout = us,latam
    kb_variant =
    kb_model =
    # CAMBIO DE IDIOMA: Alt + Shift
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gestures {
    # workspace_swipe = false
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Terminal (Super + T)
bind = $mainMod, T, exec, $terminal

# Cerrar App (Super + Q)
bind = $mainMod, Q, killactive,

# Explorador de Archivos (Super + E)
bind = $mainMod, E, exec, $fileManager

# Buscar App / Menú (Super + Espacio) - Ahora libre de conflictos
bind = $mainMod, SPACE, exec, $menu

# Salir de Hyprland (Super + M)
bind = $mainMod, M, exit,

# Flotante (Super + V)
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# Movimiento de foco (Flechas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Cambiar workspace (Super + Números)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 0, workspace, 10

# Mover ventana a workspace (Super + Shift + Números)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad movido a la tecla N para no chocar con Capturas
bind = $mainMod, N, togglespecialworkspace, magic
bind = $mainMod SHIFT, N, movetoworkspace, special:magic

# Captura de pantalla estilo Windows (Win + Shift + S)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Reiniciar la barra manualmente si desaparece (Super + Alt + B)
bind = $mainMod ALT, B, exec, killall eww && eww open bar_widget

# Menú de apagado (wlogout) con Super + ESC
bind = SUPER, ESCAPE, exec, wlogout

# Scroll workspaces con mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover/Redimensionar ventanas con mouse + Super
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Teclas multimedia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Mutear/Desmutear micrófono con F10
bind = , F10, exec, ~/.local/bin/mic-toggle.sh

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Líneas desactivadas para eliminar la barra roja de error
# windowrulev2 = suppressevent maximize, class:.*
# windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

misc {
    # Desactiva el apagado automático del monitor
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# --- Reglas para Vesktop ---
# Opacidad general (ajusta el 0.9 a tu gusto)
windowrule = opacity 0.90 0.90, match:class vesktop

# Hacer que los diálogos de "Abrir archivo" floten y estén centrados
windowrule = float on, match:class vesktop, match:title (Open File)
windowrule = center on, match:class vesktop, match:title (Open File)
windowrule = size 800 600, match:class vesktop, match:title (Open File)

# Lo mismo para "Guardar archivo" y otros popups
windowrule = float on, match:class vesktop, match:title (Save File)
windowrule = float on, match:class vesktop, match:title (Discord Popout)

# VPN
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets
